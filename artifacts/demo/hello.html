<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4ff 0%, #fafaff 100%);
      color: #1e1e2e;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 56px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
      max-width: 480px;
    }
    h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 12px; }
    p { color: #6b7280; line-height: 1.7; }
    .badge {
      display: inline-block;
      background: #f3f4f6;
      color: #374151;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">HTML artifact</div>
    <h1>Hello, World 👋</h1>
    <p>This is a plain HTML artifact served from <code>artifacts/demo/hello.html</code>.</p>
  </div>
</body>
</html>
